    <div style="display:flex; gap:10px; margin-top:10px;">
        <button id="smartBtnList" onclick="setSortModeList('smart')" style="flex:1; padding:10px; background:#4285f4; color:#fff; border:none; border-radius:8px; font-weight:bold;">⚡ Smart</button>

    </div>
