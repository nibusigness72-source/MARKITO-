<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sasta Store - Analytics</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="details.css">
</head>
<body>

    <div class="header-nav">
        <div class="back-action" onclick="goBack()">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Details</span>
        </div>
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <div class="store-banner">
        <img src="img.png" alt="Banner">
        
    </div>

    <div class="main-content">
        <div class="section-header">
            <h3><i class="fa-solid fa-chart-simple"></i> Store Analytics</h3>
            <div class="filter">Today <i class="fa-solid fa-chevron-down"></i></div>
        </div>

        <div class="stats-container">
            <div class="card p-bg">
                <i class="fa-regular fa-eye p-clr"></i>
                <p>Total Views</p>
                <h2 class="p-clr">1,245</h2>
                <small>Views</small>
            </div>
            <div class="card b-bg">
                <i class="fa-solid fa-hand-pointer b-clr"></i>
                <p>Product Clicks</p>
                <h2 class="b-clr">325</h2>
                <small>Clicks</small>
            </div>
            <div class="card lp-bg">
                <i class="fa-solid fa-location-dot lp-clr"></i>
                <p>Map Opens</p>
                <h2 class="lp-clr">87</h2>
                <small>Map Opens</small>
            </div>
            <div class="card o-bg">
                <i class="fa-solid fa-phone o-clr"></i>
                <p>Calls Received</p>
                <h2 class="o-clr">26</h2>
                <small>Calls</small>
            </div>
        </div>

        <div class="top-product-card">
            <div class="info">
                <span class="label">Most Viewed Product</span>
                <h4>Milk</h4>
                <p>542 views</p>
            </div>
            <img src="rasgulla.jpg" alt="Milk">
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

   
<script src="database.js"></script>
<script src="script.js"></script>
<script src="location.js"></script>
  

</body>
</html>
